<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Ambulans</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-top">
        <div class="ambulans-icon">🚑</div>
        <div>
            <h1>Jadwal Ambulans</h1>
            <div class="header-subtitle">AmbulanMu Seyegan — Realtime</div>
        </div>
    </div>
    <div class="date-chip">
        📅 <span id="tanggal">Memuat tanggal...</span>
    </div>
</div>

<!-- KALENDER -->
<div class="kalender-wrapper">
  <div class="kal-nav">
    <button class="kal-nav-btn" onclick="navigasiBulan(-1)">&#8249;</button>
    <span class="kal-label-bulan" id="labelBulan">Memuat...</span>
    <button class="kal-nav-btn" onclick="navigasiBulan(1)">&#8250;</button>
  </div>
  <div id="kalender"></div>
</div>

<!-- HEADER SECTION -->
<div class="section-header">
    <span class="section-title">Daftar Perjalanan</span>
    <span class="badge-count" id="badge-total">0</span>
</div>

<!-- LIST JADWAL -->
<div class="jadwal-list" id="jadwal">
    <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Memuat data jadwal...</div>
    </div>
</div>

<!-- TOMBOL PESAN -->
<div class="btn-wrapper">
    <a class="btn" href="https://format-layanan-ambulan-7idp.vercel.app/" target="_blank" rel="noopener noreferrer">
        <span class="btn-icon">🚑</span>
        PESAN AMBULANS SEKARANG
    </a>
</div>

<!-- Firebase SDK (compat — tidak perlu type="module") -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="script.js"></script>

</body>
</html>
